# KRaft broker 1 (spring-boot-kafka workflow). SASL :9092

process.roles=broker
node.id=2
controller.quorum.voters=1@localhost:9093

listeners=SASL_PLAINTEXT://:9092
advertised.listeners=SASL_PLAINTEXT://localhost:9092
inter.broker.listener.name=SASL_PLAINTEXT
controller.listener.names=CONTROLLER
listener.security.protocol.map=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,SASL_PLAINTEXT:SASL_PLAINTEXT,SASL_SSL:SASL_SSL

sasl.enabled.mechanisms=SCRAM-SHA-256
sasl.mechanism.inter.broker.protocol=SCRAM-SHA-256

authorizer.class.name=org.apache.kafka.metadata.authorizer.StandardAuthorizer
super.users=User:admin;User:ANONYMOUS

num.network.threads=3
num.io.threads=8
socket.send.buffer.bytes=102400
socket.receive.buffer.bytes=102400
socket.request.max.bytes=104857600

log.dirs=/tmp/kafka-logs-sbk-sasl-broker-1
num.partitions=3
default.replication.factor=2
min.insync.replicas=1
num.recovery.threads.per.data.dir=1

offsets.topic.replication.factor=2
share.coordinator.state.topic.replication.factor=2
share.coordinator.state.topic.min.isr=1
transaction.state.log.replication.factor=2
transaction.state.log.min.isr=1

log.retention.hours=168
log.segment.bytes=1073741824
log.retention.check.interval.ms=300000
